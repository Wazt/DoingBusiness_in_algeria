// android/app/build.gradle — Production-ready (declarative plugins)
// Play Store compliance: targetSdk 34 (mandatory since Aug 31, 2024)
// Security: ProGuard + R8 obfuscation on release builds
// Safety: release build REFUSES to sign with debug keys

plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

// Read keystore config from android/key.properties (NEVER commit this file)
def keystorePropertiesFile = rootProject.file('key.properties')
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.grantthorntondz.doingbusiness"
    compileSdkVersion 35
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }
    kotlinOptions { jvmTarget = '17' }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.grantthorntondz.doingbusiness"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 34
        versionCode flutter.versionCode
        versionName flutter.versionName
        multiDexEnabled true
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias      keystoreProperties['keyAlias']
                keyPassword   keystoreProperties['keyPassword']
                storeFile     keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        debug {
            debuggable true
            minifyEnabled false
        }

        release {
            // Only hard-fail when the user actually runs a release task.
            // Debug builds ( `flutter run`, `assembleDebug`, etc.) must not trip this check.
            def runningReleaseTask = gradle.startParameter.taskNames.any {
                it.toLowerCase().contains('release') || it.toLowerCase().contains('bundle')
            }
            if (runningReleaseTask && !keystorePropertiesFile.exists()) {
                throw new GradleException(
                    "\n\nCannot build release: android/key.properties is missing.\n" +
                    "Create it from key.properties.sample and provide your keystore.\n\n")
            }
            if (keystorePropertiesFile.exists()) {
                signingConfig signingConfigs.release
            }

            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

            ndk { debugSymbolLevel 'SYMBOL_TABLE' }
        }
    }

    bundle {
        language { enableSplit = true }
        density  { enableSplit = true }
        abi      { enableSplit = true }
    }

    packagingOptions {
        resources {
            excludes += ['META-INF/LICENSE*', 'META-INF/NOTICE*']
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation 'androidx.multidex:multidex:2.0.1'
    // Firebase BoM: single source of truth for Firebase library versions
    implementation platform('com.google.firebase:firebase-bom:33.5.0')
    // Required by flutter_local_notifications for Java 8+ API backport on older Android
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
}
