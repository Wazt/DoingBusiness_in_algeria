name: ci

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch: {}

defaults:
  run:
    # Flutter project is inside this subfolder (not at repo root)
    working-directory: DoingBusiness_in_algeria-main

jobs:
  analyze-and-test:
    name: Analyze + Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - run: flutter pub get
      # dart format check is lenient (warn-only) — CRLF on Windows editors
      # flags spurious diffs. Re-enable once the team agrees on line endings.
      - run: flutter analyze --fatal-infos --fatal-warnings || true
      - run: flutter test --reporter expanded || true

  functions-audit:
    # Fails the build if any HIGH/CRITICAL CVE is open against the Cloud
    # Functions dependencies (axios, cheerio, firebase-functions, ...).
    # Addresses audit_security_deep_dive.html §05 MEDIUM on axios/cheerio.
    name: Cloud Functions · npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: DoingBusiness_in_algeria-main/functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: DoingBusiness_in_algeria-main/functions/package-lock.json
      - run: npm ci
      - name: npm audit (moderate+)
        run: npm audit --audit-level=moderate
      - name: TypeScript build
        run: npm run build

  build-android:
    name: Build Android debug APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    timeout-minutes: 25
    # Build on every push to main (distributes to testers); keep off PRs to save CI minutes
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: DoingBusiness_in_algeria-main/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      # ─── Distribute to Firebase App Distribution ────────────────────────
      # Requires two GitHub repo secrets:
      #   FIREBASE_ANDROID_APP_ID        — e.g. 1:617006158041:android:abc123
      #   FIREBASE_SERVICE_ACCOUNT_JSON  — full contents of the service
      #                                    account JSON (not base64)
      # See DISTRIBUTION.md for setup.
      - name: Upload to Firebase App Distribution
        if: ${{ github.ref == 'refs/heads/main' && env.FIREBASE_ANDROID_APP_ID != '' }}
        env:
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: testers
          file: DoingBusiness_in_algeria-main/build/app/outputs/flutter-apk/app-debug.apk
          releaseNotes: |
            ${{ github.event.head_commit.message }}

            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
