name: doingbusiness
description: "Doing Business in Algeria — Grant Thornton"
publish_to: "none"

# Version scheme: semver+buildNumber
# Bump build number on every upload, version name on user-visible releases.
version: 1.1.0+5

environment:
  sdk: ">=3.4.0 <4.0.0"     # was >=2.17.0 — Dart 3 is the reality of your deps

dependencies:
  flutter:
    sdk: flutter

  # ─── State + DI ─────────────────────────────────
  get: ^4.6.6

  # ─── Firebase (all pinned via flutterfire) ──────
  firebase_core:     ^3.6.0
  firebase_auth:     ^5.2.1
  cloud_firestore:   ^5.4.1
  firebase_messaging: ^15.1.3
  firebase_crashlytics: ^4.1.3   # ← add in Phase 3
  firebase_analytics:   ^11.3.3  # ← add in Phase 3 (opt-in only)
  firebase_app_check:   ^0.3.1   # ← add in Phase 3 (anti-abuse)

  # ─── Storage ────────────────────────────────────
  get_storage: ^2.1.1
  shared_preferences: ^2.3.2
  # TIP: pick ONE — having both is the source of your double-source-of-truth bug.
  # Suggest standardizing on get_storage since it's already everywhere.

  # ─── UI ─────────────────────────────────────────
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  carousel_slider: ^5.0.0
  lottie: ^3.1.2
  cupertino_icons: ^1.0.8

  # ─── Network ────────────────────────────────────
  connectivity_plus: ^6.0.5
  dio: ^5.7.0

  # ─── Notifications ──────────────────────────────
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

  # ─── PDF viewer ─────────────────────────────────
  syncfusion_flutter_pdfviewer: ^27.1.50
  # TIP: Syncfusion requires a community license key declared at runtime for
  # commercial use. Verify license compliance before Play submission.

  # ─── Utility ────────────────────────────────────
  intl: ^0.19.0
  url_launcher: ^6.3.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4         # for unit tests of repos + controllers
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

